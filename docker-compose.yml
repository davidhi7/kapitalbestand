secrets:
  postgres-user:
    file: ./secrets/postgres-user
  postgres-password:
    file: ./secrets/postgres-password

services:
  postgres:
    container_name: postgres-kapital
    image: postgres
    restart: unless-stopped
    secrets:
      - postgres-user
      - postgres-password
    environment:
      POSTGRES_DB: kapitalbestand
      POSTGRES_USER_FILE: /run/secrets/postgres-user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres-password
    volumes:
      - ./volumes/postgres/:/var/lib/postgresql

  kapitalbestand:
    build: .
    image: kapitalbestand
    restart: unless-stopped
    secrets:
      - postgres-user
      - postgres-password
    environment:
      RUST_LOG: info
      DB_DATABASE: kapitalbestand
      DB_USER_FILE: /run/secrets/postgres-user
      DB_PASSWORD_FILE: /run/secrets/postgres-password
      DB_HOST: postgres
    ports:
      - 8080:8080
